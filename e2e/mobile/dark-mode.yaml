# Flow: dark-mode
# The app follows the OS color scheme (useColorScheme) — there is no in-app toggle.
# This flow uses Maestro's setDarkMode command to switch the OS to dark, relaunches,
# and asserts the app renders in dark mode by checking the offline badge color or
# background-sensitive element. We use the "Calendar" tab label as a presence check,
# since in dark mode it is still visible (accent.today color) and the shell bg is dark.

- launchApp:
    clearState: true

- runFlow: helpers/login.yaml

# Switch OS to dark mode (Maestro 1.36+)
- setDarkMode: true

# Relaunch to pick up system scheme change
- launchApp:
    clearState: false

# App should still function — calendar tab renders
- assertVisible:
    text: "Calendar"

# DOW grid visible confirms CalendarGrid rendered with dark theme
- assertVisible:
    text: "Sun"

# Legend labels visible in dark palette
- assertVisible:
    text: "XD date"

# Restore light mode
- setDarkMode: false
